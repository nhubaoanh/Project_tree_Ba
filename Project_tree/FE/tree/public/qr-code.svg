<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="white"/>
  
  <!-- QR Code Pattern (Placeholder) -->
  <g fill="black">
    <!-- Top-left finder pattern -->
    <rect x="10" y="10" width="40" height="40"/>
    <rect x="15" y="15" width="30" height="30" fill="white"/>
    <rect x="20" y="20" width="20" height="20"/>
    
    <!-- Top-right finder pattern -->
    <rect x="150" y="10" width="40" height="40"/>
    <rect x="155" y="15" width="30" height="30" fill="white"/>
    <rect x="160" y="20" width="20" height="20"/>
    
    <!-- Bottom-left finder pattern -->
    <rect x="10" y="150" width="40" height="40"/>
    <rect x="15" y="155" width="30" height="30" fill="white"/>
    <rect x="20" y="160" width="20" height="20"/>
    
    <!-- Data pattern (random-like) -->
    <rect x="60" y="60" width="10" height="10"/>
    <rect x="75" y="60" width="10" height="10"/>
    <rect x="90" y="60" width="10" height="10"/>
    <rect x="105" y="60" width="10" height="10"/>
    <rect x="120" y="60" width="10" height="10"/>
    
    <rect x="60" y="80" width="10" height="10"/>
    <rect x="75" y="80" width="10" height="10"/>
    <rect x="105" y="80" width="10" height="10"/>
    <rect x="120" y="80" width="10" height="10"/>
    
    <rect x="60" y="100" width="10" height="10"/>
    <rect x="90" y="100" width="10" height="10"/>
    <rect x="105" y="100" width="10" height="10"/>
    
    <rect x="75" y="120" width="10" height="10"/>
    <rect x="90" y="120" width="10" height="10"/>
    <rect x="120" y="120" width="10" height="10"/>
    
    <!-- Timing patterns -->
    <rect x="55" y="55" width="5" height="85" fill="white"/>
    <rect x="55" y="55" width="85" height="5" fill="white"/>
  </g>
  
  <!-- Center text -->
  <text x="100" y="95" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">Quỹ</text>
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="black">Gia Đình</text>
</svg>
